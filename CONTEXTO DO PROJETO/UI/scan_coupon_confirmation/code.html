<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PriceVision - Confirmar Dados</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb1c8",
                        "primary-fixed-dim": "#91d78a",
                        "on-secondary-container": "#562100",
                        "on-primary-fixed": "#002203",
                        "on-primary-container": "#90d689",
                        "on-error": "#ffffff",
                        "surface": "#FFFFFF",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e6e9e0",
                        "on-surface": "#191d17",
                        "primary-fixed": "#acf4a4",
                        "outline-variant": "#c0c9bb",
                        "surface-container-highest": "#e0e4db",
                        "tertiary": "#0277BD",
                        "on-tertiary-container": "#ffaec6",
                        "on-primary-fixed-variant": "#0c5216",
                        "error-container": "#ffdad6",
                        "dark-surface": "#1E1E1E",
                        "primary-container": "#C8E6C9",
                        "on-primary": "#FFFFFF",
                        "on-background": "#1C1B1F",
                        "surface-variant": "#e0e4db",
                        "secondary": "#9e4200",
                        "on-secondary-fixed": "#341100",
                        "primary": "#00450d",
                        "on-tertiary-fixed-variant": "#7a2949",
                        "surface-container-low": "#f2f5ec",
                        "inverse-surface": "#2d322c",
                        "tertiary-container": "#883454",
                        "on-tertiary": "#FFFFFF",
                        "error": "#B00020",
                        "surface-dim": "#d8dbd2",
                        "surface-container": "#ecefe6",
                        "on-tertiary-fixed": "#3e001d",
                        "secondary-fixed-dim": "#ffb691",
                        "inverse-on-surface": "#eff2e9",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#91d78a",
                        "tertiary-fixed": "#ffd9e2",
                        "surface-bright": "#f7fbf1",
                        "secondary-container": "#FFE0B2",
                        "on-secondary-fixed-variant": "#793100",
                        "background": "#FAFAFA",
                        "dark-primary": "#81C784",
                        "dark-background": "#121212",
                        "secondary-fixed": "#ffdbcb",
                        "on-surface-variant": "#41493e",
                        "outline": "#717a6d",
                        "surface-tint": "#2a6b2c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "8px",
                        "xl": "12px",
                        "2xl": "16px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "m": "16px",
                        "xl": "32px",
                        "xxl": "48px",
                        "xs": "8px",
                        "s": "12px",
                        "l": "24px",
                        "xxs": "4px"
                    },
                    "fontFamily": {
                        "sans": ["Work Sans", "sans-serif"],
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Work Sans', sans-serif; background-color: #FAFAFA; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-zinc-200 shadow-sm">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-zinc-100 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-green-900" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Work_Sans'] text-lg font-semibold tracking-tight text-green-900">Confirmar Dados</h1>
</div>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-zinc-100 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-green-900" data-icon="save">save</span>
</button>
</header>
<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto space-y-6">
<!-- Header Section -->
<section class="bg-white p-l rounded-2xl shadow-sm border border-surface-container">
<div class="flex justify-between items-start">
<div>
<h2 class="text-title-lg font-title-lg text-primary font-bold">Posto Shell Anhanguera</h2>
<p class="text-body-md font-body-md text-on-surface-variant">23/04/2026 - 14:32</p>
</div>
<div class="flex flex-col items-end">
<div class="bg-primary-container text-primary flex items-center gap-1 px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[18px]" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-label-md font-label-md font-bold">92%</span>
</div>
<span class="text-[10px] text-on-surface-variant mt-1">Confiança da IA</span>
</div>
</div>
</section>
<!-- Itemized List (Bento-style layout for better focus) -->
<div class="space-y-3">
<h3 class="text-label-lg font-label-lg text-outline ml-1 uppercase tracking-wider">Itens Extraídos</h3>
<!-- Card 1: Gasolina -->
<div class="group bg-white p-m rounded-xl border border-primary/20 shadow-sm flex items-center justify-between transition-all hover:border-primary">
<div class="flex items-center gap-m">
<div class="relative flex items-center justify-center">
<input checked="" class="w-6 h-6 rounded-md border-primary text-primary focus:ring-primary" type="checkbox"/>
</div>
<div>
<div class="text-title-sm font-title-sm font-bold text-on-surface">Gasolina Comum</div>
<div class="text-body-sm font-body-sm text-on-surface-variant">35.5L x R$ 6.10 = <span class="text-primary font-bold">R$ 216.55</span></div>
</div>
</div>
<div class="flex gap-xs">
<button class="p-xs text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="edit">edit</span></button>
<button class="p-xs text-outline hover:text-error transition-colors"><span class="material-symbols-outlined" data-icon="delete">delete</span></button>
</div>
</div>
<!-- Card 2: Limpador -->
<div class="group bg-white p-m rounded-xl border border-outline-variant shadow-sm flex items-center justify-between transition-all hover:border-outline opacity-70">
<div class="flex items-center gap-m">
<div class="relative flex items-center justify-center">
<input class="w-6 h-6 rounded-md border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
</div>
<div>
<div class="text-title-sm font-title-sm font-medium text-on-surface">Limpador Para-brisas</div>
<div class="text-body-sm font-body-sm text-on-surface-variant">Quantidade: 1 • R$ 12,90</div>
</div>
</div>
<div class="flex gap-xs">
<button class="p-xs text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="edit">edit</span></button>
<button class="p-xs text-outline hover:text-error transition-colors"><span class="material-symbols-outlined" data-icon="delete">delete</span></button>
</div>
</div>
<!-- Card 3: Óleo -->
<div class="group bg-white p-m rounded-xl border border-primary/20 shadow-sm flex items-center justify-between transition-all hover:border-primary">
<div class="flex items-center gap-m">
<div class="relative flex items-center justify-center">
<input checked="" class="w-6 h-6 rounded-md border-primary text-primary focus:ring-primary" type="checkbox"/>
</div>
<div>
<div class="text-title-sm font-title-sm font-bold text-on-surface">Óleo de Motor 1L</div>
<div class="text-body-sm font-body-sm text-on-surface-variant">Quantidade: 1 • <span class="text-primary font-bold">R$ 70,90</span></div>
</div>
</div>
<div class="flex gap-xs">
<button class="p-xs text-outline hover:text-primary transition-colors"><span class="material-symbols-outlined" data-icon="edit">edit</span></button>
<button class="p-xs text-outline hover:text-error transition-colors"><span class="material-symbols-outlined" data-icon="delete">delete</span></button>
</div>
</div>
<!-- Total Card -->
<div class="bg-primary p-l rounded-xl flex justify-between items-center text-white shadow-md mt-4">
<span class="text-title-md font-title-md uppercase tracking-widest opacity-90">Total Confirmado</span>
<span class="text-headline-sm font-bold">R$ 287,45</span>
</div>
</div>
<!-- Forms Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Category Dropdown -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface-variant px-1">Categoria</label>
<div class="relative">
<select class="w-full bg-white border border-outline-variant rounded-lg p-3 text-body-md appearance-none focus:ring-2 focus:ring-primary focus:border-primary outline-none">
<option>Mobilidade &gt; Combustível</option>
<option>Manutenção &gt; Veículo</option>
<option>Outros</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-3 pointer-events-none text-outline" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Tags Field -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface-variant px-1">Tags</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none" placeholder="Adicionar tags..." type="text" value="#jac_j2"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline" data-icon="sell">sell</span>
</div>
</div>
</div>
<!-- Observations -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface-variant px-1">Observações</label>
<textarea class="w-full bg-white border border-outline-variant rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none resize-none" placeholder="Notas adicionais sobre esta transação..." rows="3"></textarea>
</div>
</main>
<!-- Bottom Actions Layer -->
<div class="fixed bottom-0 left-0 w-full bg-white border-t border-zinc-200 p-4 flex gap-4 z-50">
<button class="flex-1 h-12 rounded-lg border border-secondary text-secondary font-bold text-label-lg hover:bg-secondary-container transition-colors active:scale-95">
            CANCELAR
        </button>
<button class="flex-[2] h-12 rounded-lg bg-primary text-white font-bold text-label-lg shadow-lg hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span>
            SALVAR DADOS
        </button>
</div>
<!-- Background Decorative Element (Asymmetric) -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl -mr-32 -mt-32"></div>
<div class="fixed bottom-0 left-0 -z-10 w-80 h-80 bg-secondary/5 rounded-full blur-3xl -ml-40 -mb-40"></div>
</body></html>
