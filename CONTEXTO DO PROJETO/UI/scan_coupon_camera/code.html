<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .camera-overlay {
            background: rgba(0, 0, 0, 0.4);
            clip-path: polygon(0% 0%, 0% 100%, 15% 100%, 15% 15%, 85% 15%, 85% 85%, 15% 85%, 15% 100%, 100% 100%, 100% 0%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black font-body-md text-on-surface overflow-hidden">
<!-- Camera Background -->
<div class="fixed inset-0 z-0">
<img alt="View of a white paper grocery receipt held against a blurred supermarket background with warm ambient lighting" class="w-full h-full object-cover opacity-90" data-alt="Close-up of a paper grocery receipt held by a person in a brightly lit modern supermarket aisle with soft focus background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDwOrquK8gSyvmR245t9ueSrZrf_XUojgbnXq_-A5047WRYPdMm_p5tqE8vPPN406gdJ3D4doKgWov8iR_qwrGiDPqGuXw-Ad-OMXGbXxv1Uw5gYYSMT_1qFXGrMFL6IAy8hWsl7mb-BbTm7ENO2rJuowcdeiH14bUaaCT6eEFGV9GLPY8K0_FVN6pzwnnk_Lr5Xki_cQaMhJHIzvSiH7a6xWOk8Tf7ERuU3j7FNUHe1G7mWc4RgI7T291Vx-l1i8tnbA5aaBRrVHE"/>
</div>
<!-- UI Overlay Layer -->
<div class="fixed inset-0 z-10 flex flex-col pointer-events-none">
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-black/20 backdrop-blur-sm pointer-events-auto">
<div class="flex items-center gap-m">
<button class="p-xs text-white active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-['Work_Sans'] text-lg font-semibold tracking-tight text-white">PriceVision</h1>
</div>
<div class="flex items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-white/20 overflow-hidden">
<img alt="User profile avatar" data-alt="Professional headshot of a smiling man with neat hair against a clean neutral studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDw1MTEkDy6kS_lRdIGuWEBxNlGZWCTe5ZyhpeSFMzbleXAemYCr1hx8QHv0l_s99cbA4NxcpRaBCvrvM_LdNHBvw3-LTGPoKsb_PCvhWJ8rhcSaLmUC5dLiNPSFNQcqKuOjIuJl5dIIEPh7t3ZXZtaz2CSn6MkNBb_NqhWaNgJvlq7Vnco9o_-JbK-tqogAU3q6WCfo_E06n6rQH5HuMArxJv_uPPb5zuTuN82_JaiP6-v24Lcp0OANc4gVJXmj4Gyf93Bqpx_71s"/>
</div>
</div>
</header>
<!-- Main Canvas Area (Receipt Guide) -->
<main class="flex-1 relative flex items-center justify-center p-l">
<!-- Semi-transparent overlay with hole for receipt -->
<div class="absolute inset-0 camera-overlay pointer-events-none"></div>
<!-- Alignment Guide -->
<div class="relative w-full max-w-[280px] h-[60%] border-2 border-dashed border-white/80 rounded-lg flex flex-col items-center justify-center gap-m">
<div class="bg-black/40 backdrop-blur-md px-m py-xs rounded-full border border-white/10">
<p class="font-label-md text-label-md text-white">Align receipt within frame</p>
</div>
<!-- Corner markers for extra guidance -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg -translate-x-1 -translate-y-1"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg translate-x-1 -translate-y-1"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg -translate-x-1 translate-y-1"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg translate-x-1 translate-y-1"></div>
</div>
</main>
<!-- Bottom Controls -->
<footer class="h-40 relative flex items-center justify-between px-xl pointer-events-auto">
<!-- Gallery Button -->
<button class="flex flex-col items-center justify-center gap-xxs text-white active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined" data-icon="image">image</span>
</div>
<span class="font-label-sm text-label-sm">Gallery</span>
</button>
<!-- Capture Button -->
<div class="relative flex items-center justify-center">
<div class="absolute w-24 h-24 rounded-full border-4 border-primary/30 scale-110"></div>
<button class="w-20 h-20 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-lg active:scale-90 transition-transform elevation-3">
<span class="material-symbols-outlined text-[32px]" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<!-- Flash Toggle -->
<button class="flex flex-col items-center justify-center gap-xxs text-white active:scale-95 transition-transform">
<div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined" data-icon="flash_on">flash_on</span>
</div>
<span class="font-label-sm text-label-sm">Flash Off</span>
</button>
</footer>
</div>
<!-- Hidden Bottom Nav (Suppressed per "Task-Focused" rule but available if needed for architecture) -->
<!-- Navigation is hidden as this is a focused camera task screen -->
</body></html>
